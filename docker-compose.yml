services:
  agent:
    build:
      context: .
      args:
        # Override to ship an earlier checkpoint:
        # docker compose build --build-arg CHECKPOINT=checkpoint-2-agent-loop
        CHECKPOINT: checkpoint-4-orchestration
    image: project-4-agents:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - chroma-data:/app/.chroma
    restart: unless-stopped

volumes:
  chroma-data:
